version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cendol_backend
    env_file:
      - ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: /var/www/database/database.sqlite
    volumes:
      - cendol_database:/var/www/database
      - cendol_uploads:/var/www/storage/app/public
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    container_name: cendol_nginx
    ports:
      - "80:80"
    volumes:
      - cendol_uploads:/var/www/storage/app/public:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  cendol_database:
  cendol_uploads:
