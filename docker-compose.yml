version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cendol_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:7k5m7gG4a69jW+L6n14R9wZ5+S2m3K1e7k8L9tG4a6M=
      - DB_CONNECTION=sqlite
      - DB_DATABASE=/var/www/database/database.sqlite
    restart: unless-stopped
